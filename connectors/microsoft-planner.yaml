id: microsoft-planner
name: Microsoft Planner (Premium / Project for the Web)
description: |
  Read tasks from a Planner Premium plan, create tasks in bulk from a TaskBatch input,
  and sweep-delete all tasks. UI automation only — date/dependency operations that
  require the PSS REST API are out of scope for v1.
version: 1.1.1
author: OpenConnectors Contributors
license: MIT
tags: [planner, m365, microsoft, write, tasks]

institution:
  name: Microsoft Planner
  url: https://tasks.office.com
  country: US
  locale: en-US
  timezone: UTC

auth:
  type: persistent_profile
  profile_id: m365
  browser: msedge
  signed_in_as_hint: "Your M365 work/school account"
  expiry_probe:
    redirect_indicates_expiry:
      - login.microsoftonline.com
      - login.live.com

# Applied to every templated input string before the runtime dispatches it to Playwright,
# AND applied first when evaluating idempotency key parts on both existing and incoming
# rows. See design-v1.md §2.3 for the full normalization pipeline.
text_normalizers: [strip_emoji, ascii_dashes, ascii_arrows, nfc, collapse_whitespace]

pii_patterns: [corporate_m365]

known_quirks:
  - "View tabs are labelled 'View Board' / 'View Grid' (the verb is part of the aria-label)."
  - "Bucket headers carry verbose aria-labels: 'Bucket: <name>, N of M. K tasks in this bucket. ...'. Match by prefix."
  - "Per-bucket 'Add task' affordance is labelled 'Add task card in <bucket> column' — there is NO globally-labelled 'Add task' button. The element is a <div role=\"button\"> (NOT a real <button>); always resolve by `role: button` (Playwright role-based queries handle both implicit and explicit roles), never by raw `button[...]` CSS."
  - "Task cards have NO 'Task card:' prefix. Real label is '<title>, Use arrow keys to access important task information, ...'. Split on ', Use arrow keys' to recover the title."
  - "Bucket headers and task cards BOTH carry role=listitem; disambiguate by the `task-board-card` class on cards (or by aria-label prefix). A bare `[role=listitem]` selector will hit bucket headers."
  - "Card-level 'More options' is LOWERCASE; bucket-header 'More Options' is CAPITAL O. Keep match_case:true on the card hover-menu step to avoid clicking the bucket's overflow menu by accident."
  - "The hover-revealed ellipsis menu is conditionally RENDERED in the DOM on hover (not just CSS-hidden). It MUST be triggered via Playwright locator hover (CDP-trusted pointer event); synthetic dispatchEvent / page.mouse.move from page-evaluated JS will NOT fire React's hover state machine."
  - "Card-delete menu item is labelled 'Delete task' (not bare 'Delete')."
  - "Pressing Enter in the 'Enter a task name' input creates DUPLICATE cards (both the input's keydown handler AND the form's submit handler fire). ALWAYS click the explicit 'Add task' submit button — never submit by Enter."
  - "Grid view default columns are Task Name | Quick look | Assigned to | Duration | Labels — no bucket / priority / progress. Read tasks from Board view (bucket-walk) instead."
  - "Board view is required for Add task; bucket-walk on Board view is required for bulk read."
  - "Clicking a task title enters edit mode; click the card body (not the title) to open the detail panel."
  - "Delete-all must sweep: the grid virtualises rows, one pass misses most tasks."
  - "Planner garbles em-dash/en-dash and emoji when typed — runtime normalizes on the way in."
  - "Buckets scroll horizontally on plans with >5 buckets; auto-scroll-into-view is required before Add task."
  - "Delete confirmation dialog is NOT shown on all tenants — the confirm step is optional with a short timeout."
  - "Card delete is via hover→ellipsis→Delete, NOT right-click. Right-click opens the browser context menu."
  - "Checklist idempotency is title+bucket only; v1 will not reconcile checklist deltas on a rerun. For a clean slate, delete then recreate."

actions:

  # ── list_tasks ─────────────────────────────────────────────────────────────
  # Reads Board view bucket-by-bucket so that every TaskDraft carries its
  # bucket. This is required for the create_tasks_from_batch idempotency key
  # (title|bucket): if bucket is undefined for existing rows but populated for
  # incoming rows, every rerun would create duplicates of every task.
  - name: list_tasks
    kind: fetch
    description: List all tasks currently in the plan (used for idempotency + sweep).
    input_schema:
      type: object
      properties:
        plan_url: { type: string, description: "Full Planner plan URL" }
      required: [plan_url]
    output_schema: TaskDraft[]
    pre_steps:
      - dismiss_if_present: { label: "Close welcome banner", timeout_seconds: 2 }
    steps:
      - phase: navigate
        instructions: "browser_navigate to {{input.plan_url}}"
      - phase: navigate
        # The view tab aria-label is "View Board" — the verb is part of the label.
        navigate_by_labels:
          - { label: "View Board", role: tab, click_action: click, next_scope: controlled_region }
      - phase: extract
        instructions: |
          Walk the Board view bucket-by-bucket. The buckets strip scrolls
          horizontally on plans with more than ~5 buckets — scroll the strip
          (NOT the page) to bring each bucket into view in turn.

          For each bucket header (aria-label starts with "Bucket: "):
            - Extract the bucket name as the substring between "Bucket: " and
              the first comma (regex: ^Bucket: (.+?),).
            - Within that bucket's accessibility subtree, enumerate every task
              card. A card's aria-label has the shape
              "<title>, Use arrow keys to access important task information, ...".
              Recover the title by splitting on ", Use arrow keys" and taking
              the prefix.
            - Emit { title, bucket } per card. Do NOT attempt to read priority
              or progress from this view — those live in the per-card detail
              panel and are not needed for idempotency.

          Return TaskDraft[].

  # ── create_tasks_from_batch ────────────────────────────────────────────────
  - name: create_tasks_from_batch
    kind: mutation
    description: Create Planner tasks from a TaskBatch input, one per item.
    input_schema:
      extends: TaskBatch
      supports: [title, bucket, priority, progress, notes, checklist]
      unsupported_fields: warn
    for_each: "{{input.tasks}}"
    as: task
    failure_mode: continue
    timeout_seconds: 600
    idempotency:
      key:
        - { from: "task.title",  normalize: [lower, trim] }
        - { literal: "|" }
        - { from: "task.bucket", normalize: [lower, trim] }
      read_via: list_tasks
      on_conflict: skip
    preview:
      mode: describe_only
      emit:
        - "Would create task '{{task.title}}' in bucket '{{task.bucket}}'"
        - "  priority={{task.priority}} progress={{task.progress}}"
        - "  checklist items: {{task.checklist.length}}"
    batch:
      concurrency: 1
    pre_steps:
      - dismiss_if_present: { label: "Close welcome banner" }
      - dismiss_if_present: { label: "Not now" }
    steps:
      - phase: navigate
        navigate_by_labels:
          - { label: "View Board", role: tab, click_action: click, next_scope: controlled_region }
      - phase: mutate
        # Auto-scroll-into-view is implicit on navigate_by_labels (see PR5); this
        # handles the >5-bucket horizontal-scroll quirk. Bucket headers carry
        # verbose labels like "Bucket: Compliance & Reviews, 1 of 9. 9 tasks in
        # this bucket. ..." — match by prefix and don't constrain role (it is
        # inconsistent across tenants).
        navigate_by_labels:
          - { label: "Bucket: {{task.bucket}}", match_mode: prefix, next_scope: subtree }
          - { label: "Add task card in {{task.bucket}} column", role: button, click_action: click }
        fallback_instructions: |
          Horizontally scroll the Board view bucket strip until the
          "{{task.bucket}}" column is visible, then click the
          "Add task card in {{task.bucket}} column" button.
      - phase: mutate
        instructions: |
          Type {{task.title}} into the input with placeholder "Enter a task name".
          DO NOT press Enter — it triggers BOTH the keydown handler and the form
          submit, creating duplicate cards. Click the explicit "Add task" submit
          button (role: button) inside the same form instead. After the click the
          input clears and stays focused, ready for the next title.
        capture:
          as: task_id
          # After submit, the newly-created card exposes aria-label
          # "<title>, Use arrow keys to access important task information, ...".
          # Capture the title (everything before ", Use arrow keys") into the
          # BatchReport.items[].captured map.
          from_aria_label_regex: "^(.+?), Use arrow keys"
      - phase: mutate
        # Open the detail panel. We click the card body — NOT the title text,
        # which enters title-edit mode (see known_quirks). Match the card by
        # prefix on the title since the real aria-label is suffixed.
        navigate_by_labels:
          - { label: "{{task.title}}, Use arrow keys", match_mode: prefix, click_action: click, next_scope: page }
        fallback_instructions: |
          Click the body of the card titled {{task.title}} (NOT the title text — that enters edit mode).
          The task-detail panel should slide in from the right.
      - phase: mutate
        instructions: |
          In the detail panel, if task.priority is set, click the Priority dropdown and
          pick the matching label (1=Urgent, 3=Important, 5=Medium, 9=Low).
          If task.progress is set, click the Progress dropdown and pick
          0=Not started, 50=In progress, 100=Completed.
          If task.notes, fill the notes textarea with task.notes.
          For each item in task.checklist, click "Add an item" and type the item + Enter.
          Press Escape to close the panel.
    verify:
      - phase: verify
        navigate_by_labels:
          - { label: "View Board", role: tab, click_action: click, next_scope: controlled_region }
          - { label: "Bucket: {{task.bucket}}", match_mode: prefix, next_scope: subtree }
          - { label: "{{task.title}}, Use arrow keys", match_mode: prefix }
        fallback_instructions: |
          Confirm a card whose title is {{task.title}} is visible under the {{task.bucket}} column.

  # ── delete_all_tasks ───────────────────────────────────────────────────────
  - name: delete_all_tasks
    kind: mutation
    destructive: true
    requires_confirmation: true
    description: |
      Delete every task in the plan. Sweeps via Board view using hover→ellipsis→Delete
      on each card, re-reading the task list between passes because the grid virtualises rows.
    input_schema:
      type: object
      properties: { plan_url: { type: string } }
      required: [plan_url]
    sweep:
      targets_from: list_tasks
      as: task
      until_empty: true
      max_passes: 10
      refresh_between_passes: true
    failure_mode: continue
    preview:
      mode: describe_only
      emit:
        - "Would delete all {{list_tasks.length}} tasks from the plan (DESTRUCTIVE)."
    pre_steps:
      - dismiss_if_present: { label: "Close welcome banner" }
    steps:
      - phase: navigate
        navigate_by_labels:
          - { label: "View Board", role: tab, click_action: click, next_scope: controlled_region }
      - phase: mutate
        # Scope into the task's bucket so the subsequent "More options" lookup
        # only sees nodes inside the hovered card's subtree.
        navigate_by_labels:
          - { label: "Bucket: {{task.bucket}}", match_mode: prefix, next_scope: subtree }
          - { label: "{{task.title}}, Use arrow keys", match_mode: prefix, click_action: hover, next_scope: subtree }
      - phase: mutate
        # Hover-revealed ellipsis. The card label is LOWERCASE "More options";
        # bucket-header overflow is CAPITAL O "More Options". Keep
        # match_case: true so we never hit the bucket's button by accident
        # (the previous step's `next_scope: subtree` already restricts us to
        # the hovered card's a11y subtree, but case-strict matching is the
        # belt-and-suspenders guard required by issue #4 finding 3).
        navigate_by_labels:
          - { label: "More options", match_case: true, role: button }
        fallback_instructions: |
          Click the "..." / ellipsis button that appeared on hover over the card.
          Match the LOWERCASE "More options" label — uppercase "More Options"
          is the bucket header's button and would delete the wrong thing.
      - phase: mutate
        # Real menuitem label is "Delete task" — exact "Delete" does not match.
        navigate_by_labels:
          - { label: "Delete task", role: menuitem }
      - phase: mutate
        # Confirmation dialog; absent on some tenants — runtime tolerates missing label.
        optional: true
        timeout_seconds: 3
        navigate_by_labels:
          - { label: Delete, role: button }
        fallback_instructions: "If a Delete confirmation dialog is shown, click Delete. Otherwise skip."

